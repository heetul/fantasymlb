<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        .manager-rank-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .manager-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 25px; border-radius: 15px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .manager-card .top-label { font-size: 14px; opacity: 0.9; margin-bottom: 8px; display: block; color: #cbd5e1; font-weight: 600; }
        .manager-card .team-name { font-size: 22px; font-weight: 800; margin-bottom: 12px; display: block; letter-spacing: -0.5px; }
        .manager-card .efficiency-score { font-size: 38px; font-weight: 900; color: #fbbf24; }
        .standings-wrapper { margin-bottom: 40px; border: 2px solid #0f172a; border-radius: 12px; overflow: hidden; }
        .standings-header { background: #0f172a; color: white; padding: 15px; font-weight: 800; text-align: center; font-size: 18px; }
        .standings-table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: #f1f5f9; padding: 12px; font-size: 13px; color: #475569; border-bottom: 2px solid #cbd5e1; }
        .standings-table td { padding: 12px; text-align: center; border-bottom: 1px solid #e2e8f0; font-weight: 600; }
        .division-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .hs-tag { background: #fee2e2; color: #ef4444; }
        .jh-tag { background: #e0f2fe; color: #0ea5e9; }
        .filter-section { margin: 30px 0; text-align: center; }
        .week-selector { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .week-btn { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 30px; background: white; cursor: pointer; font-weight: 700; color: #64748b; transition: all 0.2s; }
        .week-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .tab-buttons { display: flex; justify-content: center; margin-bottom: 15px; }
        .tab-buttons button { padding: 14px 40px; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; color: #475569; }
        .tab-buttons button.active { background: #f1f5f9; color: #0f172a; border-bottom: 3px solid #ef4444; }
        .table-wrapper { overflow-x: auto; margin-bottom: 50px; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 13px; }
        th, td { padding: 12px 6px; border: 1px solid #f1f5f9; text-align: center; }
        .rank-cell { border-radius: 6px; padding: 6px 2px; display: block; }
        .stat-val { font-weight: 800; display: block; font-size: 14px; }
        .rank-info { font-size: 12px; font-weight: 700; opacity: 0.8; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        select { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; }
        .chart-container { position: relative; height: 600px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }

</head>

    </div>

    <div class="tab-buttons">

    </div>
    <div id="tableContainer" class="table-wrapper"></div>

            </optgroup>
        </select>
    </div>
    <div class="chart-container">

</div>

    // ── 데이터 빌드 ────────────────────────────────────────────────────────
    function buildDashboardData() {
        const keys = ["Total","W1-4","W5","W6","W7","W8","W9","W10","W11","W12"];
        const result = {};
        keys.forEach(k => { result[k] = { hitter:{}, pitcher:{} }; });

        teamList.forEach(team => {
            const d = rawHistory[team];
            const steps = [
                { target:"W1-4", curr:d.W1_4,  prev:null    },
                { target:"W5",   curr:d.W5,    prev:d.W1_4  },
                { target:"W6",   curr:d.W6,    prev:d.W5    },
                { target:"W7",   curr:d.W7,    prev:d.W6    },
                { target:"W8",   curr:d.W8,    prev:d.W7    },
                { target:"W9",   curr:d.W9,    prev:d.W8    },
                { target:"W10",  curr:d.W10,   prev:d.W9    },
                { target:"W11",  curr:d.W11,   prev:d.W10   },
                { target:"W12",  curr:d.Total, prev:d.W11   },
                { target:"Total",curr:d.Total, prev:null     }
            ];
            steps.forEach(step => {
                ['hitter','pitcher'].forEach(type => {
                    Object.keys(step.curr[type]).forEach(stat => {
                        if (!result[step.target][type][stat]) result[step.target][type][stat] = [];
                        const cv = step.curr[type][stat];
                        const rateStats = ['OBP','OPS','ERA','WHIP','K_BB'];
                        if (!step.prev || rateStats.includes(stat)) {
                            result[step.target][type][stat].push(cv);
                        } else {
                            result[step.target][type][stat].push(
                                Number((cv - step.prev[type][stat]).toFixed(1))
                            );
                        }
                    });
                });
            });
        });
        return result;
    }

    const calculatedData = buildDashboardData();
    let currentWeek = 'Total';
    let currentTableType = 'hitter';
    let myChart;

    function formatValue(k, v) {
        if (['OBP','OPS'].includes(k)) return Number(v).toFixed(3);
        if (['ERA','WHIP','K_BB'].includes(k)) return Number(v).toFixed(2);
        if (k === 'IP') return Number(v).toFixed(1);
        return v;
    }

    function getRank(v, arr, lowGood=false) {
        const sorted = [...arr].sort((a,b) => lowGood ? a-b : b-a);
        return sorted.indexOf(v) + 1;
    }

    function calcManagerPower() {
        const ts = calculatedData["Total"];
        const list = teamList.map((team, idx) => {
            const info = teamsDB[team];
            const hSum =
                getRank(ts.hitter.R[idx],   ts.hitter.R)   +
                getRank(ts.hitter.HR[idx],  ts.hitter.HR)  +
                getRank(ts.hitter.RBI[idx], ts.hitter.RBI) +
                getRank(ts.hitter.SB[idx],  ts.hitter.SB)  +
                getRank(ts.hitter.K[idx],   ts.hitter.K,   true) +
                getRank(ts.hitter.OBP[idx], ts.hitter.OBP) +
                getRank(ts.hitter.OPS[idx], ts.hitter.OPS);
            const pSum =
                getRank(ts.pitcher.IP[idx],   ts.pitcher.IP)          +
                getRank(ts.pitcher.ERA[idx],  ts.pitcher.ERA,  true)  +
                getRank(ts.pitcher.WHIP[idx], ts.pitcher.WHIP, true)  +
                getRank(ts.pitcher.K_BB[idx], ts.pitcher.K_BB)        +
                getRank(ts.pitcher.QS[idx],   ts.pitcher.QS)          +
                getRank(ts.pitcher.SV_H[idx], ts.pitcher.SV_H)        +
                getRank(ts.pitcher.NW[idx],   ts.pitcher.NW);
            const avgStatRank = (hSum + pSum) / 14;
            const score = Number((avgStatRank - info.rank).toFixed(1));
            return { name:team, ...info, score, avgStatRank };
        });
        const sorted = [...list].sort((a,b) => a.avgStatRank - b.avgStatRank);
        list.forEach(t => { t.rotoRank = sorted.findIndex(r => r.name===t.name) + 1; });
        return list;
    }

    function updateView(v) {
        currentWeek = v;
        document.querySelectorAll('.week-btn').forEach(b => {
            b.classList.toggle('active', b.getAttribute('onclick').includes(`'${v}'`));
        });
        renderDashboard();
    }

    function toggleTable(type) {
        currentTableType = type;
        document.getElementById('btnHitter').classList.toggle('active', type==='hitter');
        document.getElementById('btnPitcher').classList.toggle('active', type==='pitcher');
        renderTable();
    }

    function getGrad(r, t) {
        const ratio = (r-1)/(t-1);
        return `rgb(${Math.round(239+(254-239)*ratio)},${Math.round(68+(240-68)*ratio)},${Math.round(68+(138-68)*ratio)})`;
    }

    function renderDashboard() {
        const stat = document.getElementById('statSelect').value;
        const cd = calculatedData[currentWeek];
        const set = { ...cd.hitter, ...cd.pitcher };
        const combined = teamList.map((name,i) => ({ name, val:set[stat][i] }));
        const lowGood = ['ERA','WHIP','K'].includes(stat);
        combined.sort((a,b) => lowGood ? a.val-b.val : b.val-a.val);

        if (myChart) myChart.destroy();
        myChart = new Chart(document.getElementById('statChart').getContext('2d'), {
            type:'bar',
            data:{ labels:combined.map(d=>d.name), datasets:[{ data:combined.map(d=>d.val), backgroundColor:combined.map((_,i)=>getGrad(i+1,14)), borderRadius:8 }] },
            options:{
                indexAxis:'y', responsive:true, maintainAspectRatio:false,
                plugins:{
                    legend:{display:false},
                    datalabels:{ anchor:'end', align:'right', color:'#1e293b', font:{weight:'800'}, formatter:(v)=>formatValue(stat,v) }
                }
            }
        });
        renderTable();
    }

    function renderTable() {
        const cd = calculatedData[currentWeek];
        const set = currentTableType==='hitter' ? cd.hitter : cd.pitcher;
        const keys = Object.keys(set);
        let html = '<table><thead><tr><th>Team Name</th>' + keys.map(k=>`<th>${k}</th>`).join('') + '</tr></thead><tbody>';
        teamList.forEach((name, idx) => {
            const info = teamsDB[name];
            html += `<tr><td style="text-align:left;font-weight:800;padding-left:15px;">${name} <span class="division-tag ${info.div==='현석'?'hs-tag':'jh-tag'}">${info.div}</span></td>`;
            keys.forEach(k => {
                const val = set[k][idx];
                const r = [...set[k]].sort((a,b)=>(['ERA','WHIP','K'].includes(k))?a-b:b-a).indexOf(val)+1;
                html += `<td><div class="rank-cell" style="background:${getGrad(r,14)};"><span class="stat-val">${formatValue(k,val)}</span><span class="rank-info">${r}위</span></div></td>`;
            });
            html += '</tr>';
        });
        document.getElementById('tableContainer').innerHTML = html + '</tbody></table>';
    }

    window.onload = () => {
        const pow = calcManagerPower();
        document.getElementById('managerTop3').innerHTML =
            [...pow].sort((a,b)=>a.rotoRank-b.rotoRank).slice(0,3).map((m,i) => `
                <div class="manager-card">
                    <span class="top-label">로티서리 순위 TOP ${i+1}</span>
                    <span class="team-name">${m.name}</span>
                    <div class="efficiency-score">${m.score>0?'+':''}${m.score.toFixed(1)}</div>
                </div>`).join('');

        document.getElementById('standingsBody').innerHTML =
            [...pow].sort((a,b)=>a.rank-b.rank).map(s => `
                <tr>
                    <td>${s.rank}</td>
                    <td style="text-align:left;padding-left:15px;">${s.name} <span class="division-tag ${s.div==='현석'?'hs-tag':'jh-tag'}">${s.div}</span></td>
                    <td>${s.div} 리그</td>
                    <td>${s.wlt}</td>
                    <td>${s.pct.toFixed(3)}</td>
                    <td style="color:${s.score>0?'#ef4444':'#3b82f6'}">${s.score>0?'+':''}${s.score.toFixed(1)}</td>
                    <td style="font-weight:800;color:#0f172a;">${s.rotoRank}위</td>
                </tr>`).join('');
        renderDashboard();
    };
</script>
</body>
</html>
