        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }

        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        .manager-rank-section { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .manager-card { background: linear-gradient(135deg, #1e293b 0%, #334155 100%); color: white; padding: 20px; border-radius: 15px; text-align: center; }
        .manager-card .team-name { font-size: 20px; font-weight: 800; margin-bottom: 10px; display: block; }
        .manager-card .efficiency-score { font-size: 32px; font-weight: 900; color: #fbbf24; }
        .standings-wrapper { margin-bottom: 40px; border: 2px solid #0f172a; border-radius: 12px; overflow: hidden; }
        .standings-header { background: #0f172a; color: white; padding: 15px; font-weight: 800; text-align: center; font-size: 18px; }
        .standings-table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: #f1f5f9; padding: 12px; font-size: 13px; color: #475569; }
        .standings-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        .division-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .hs-tag { background: #fee2e2; color: #ef4444; }
        .jh-tag { background: #e0f2fe; color: #0ea5e9; }
        .filter-section { margin: 30px 0; text-align: center; }
        .week-selector { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .week-btn { padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 30px; background: white; cursor: pointer; font-weight: 700; color: #64748b; }
        .week-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.2); }
        .tab-buttons { display: flex; justify-content: center; margin-bottom: 15px; }
        .tab-buttons button { padding: 14px 40px; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; color: #475569; }
        .tab-buttons button.active { background: #f1f5f9; color: #0f172a; border-bottom: 3px solid #ef4444; }
        .table-wrapper { overflow-x: auto; margin-bottom: 50px; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 13px; }
        th, td { padding: 12px 6px; border: 1px solid #f1f5f9; text-align: center; }
        .rank-cell { border-radius: 6px; padding: 6px 2px; display: block; }
        .stat-val { font-weight: 800; display: block; font-size: 14px; }
        .rank-info { font-size: 12px; font-weight: 700; opacity: 0.8; }
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        select { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; }
        .chart-container { position: relative; height: 600px; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; }

</head>

    // 3. 주차별 증감 스탯 계산 함수 (비율 지표 상속, 누적 수치 연산)
    function buildDashboardData() {
        const result = {
            "Total": { hitter: {}, pitcher: {} },
            "W1-4": { hitter: {}, pitcher: {} },
            "W5": { hitter: {}, pitcher: {} },
            "W6": { hitter: {}, pitcher: {} },
            "W7": { hitter: {}, pitcher: {} },
            "W8": { hitter: {}, pitcher: {} }
        };

        const steps = [
            { key: "W1-4", src: rawData.W1_4 },
            { key: "W5", src: rawData.W5_Cumu, prev: rawData.W1_4 },
            { key: "W6", src: rawData.W6_Cumu, prev: rawData.W5_Cumu },
            { key: "W7", src: rawData.W7_Cumu, prev: rawData.W6_Cumu },
            { key: "W8", src: rawData.Total, prev: rawData.W7_Cumu }
        ];

        // Total 데이터는 rawData.Total 구조 직접 연계
        teamList.forEach(team => {
            ['hitter', 'pitcher'].forEach(type => {
                Object.keys(rawData.Total[team][type]).forEach(stat => {
                    if (!result["Total"][type][stat]) result["Total"][type][stat] = [];
                    result["Total"][type][stat].push(rawData.Total[team][type][stat]);
                });
            });
        });

        // 각 주차별 쪼개기 연산
        steps.forEach(step => {
            teamList.forEach((team, i) => {
                ['hitter', 'pitcher'].forEach(type => {
                    Object.keys(step.src[team][type]).forEach(stat => {
                        if (!result[step.key][type][stat]) result[step.key][type][stat] = [];
                        
                        const currVal = step.src[team][type][stat];
                        if (!step.prev || ['OBP', 'OPS', 'ERA', 'WHIP', 'K_BB'].includes(stat)) {
                            result[step.key][type][stat].push(currVal);
                        } else {
                            const prevVal = step.prev[team][type][stat];
                            result[step.key][type][stat].push(Number((currVal - prevVal).toFixed(1)));
                        }
                    });
                });
            });
        });

        return result;
    }

    const calculatedData = buildDashboardData();
    let currentWeek = 'Total';
    let currentTableType = 'hitter';
    let myChart;

    function formatValue(k, v) {
        if (['OBP', 'OPS'].includes(k)) return Number(v).toFixed(3);
        if (['ERA', 'WHIP', 'K_BB'].includes(k)) return Number(v).toFixed(2);
        return v;
    }

    // 4. 전 14개 공식 카테고리 종합 운영 실력 점수 산출 로직
    function calcManagerPower() {
        const totalSet = calculatedData["Total"];
        return leagueStandings.map(teamInfo => {
            const team = teamInfo.name;
            const idx = teamList.indexOf(team);

            const hSum = getRank(totalSet.hitter.R[idx], totalSet.hitter.R) +
                        getRank(totalSet.hitter.HR[idx], totalSet.hitter.HR) +
                        getRank(totalSet.hitter.RBI[idx], totalSet.hitter.RBI) +
                        getRank(totalSet.hitter.SB[idx], totalSet.hitter.SB) +
                        getRank(totalSet.hitter.K[idx], totalSet.hitter.K, true) +
                        getRank(totalSet.hitter.OBP[idx], totalSet.hitter.OBP) +
                        getRank(totalSet.hitter.OPS[idx], totalSet.hitter.OPS);

            const pSum = getRank(totalSet.pitcher.IP[idx], totalSet.pitcher.IP) +
                        getRank(totalSet.pitcher.ERA[idx], totalSet.pitcher.ERA, true) +
                        getRank(totalSet.pitcher.WHIP[idx], totalSet.pitcher.WHIP, true) +
                        getRank(totalSet.pitcher.K_BB[idx], totalSet.pitcher.K_BB) +
                        getRank(totalSet.pitcher.QS[idx], totalSet.pitcher.QS) +
                        getRank(totalSet.pitcher.SV_H[idx], totalSet.pitcher.SV_H) +
                        getRank(totalSet.pitcher.NW[idx], totalSet.pitcher.NW);

            const avgStatRank = (hSum + pSum) / 14;
            const score = Number((avgStatRank - teamInfo.rank).toFixed(1));
            return { ...teamInfo, score };
        }).sort((a, b) => b.score - a.score);
    }

    function updateView(v) {
        currentWeek = v;
        document.querySelectorAll('.week-btn').forEach(b => b.classList.toggle('active', b.getAttribute('onclick').includes(`'${v}'`)));
        renderDashboard();
    }

    function toggleTable(type) {
        currentTableType = type;
        document.getElementById('btnHitter').classList.toggle('active', type === 'hitter');
        document.getElementById('btnPitcher').classList.toggle('active', type === 'pitcher');
        renderTable();
    }

    function renderDashboard() {
        const stat = document.getElementById('statSelect').value;
        const currentData = calculatedData[currentWeek];
        const ctx = document.getElementById('statChart').getContext('2d');
        const set = { ...currentData.hitter, ...currentData.pitcher };
        const combined = teamList.map((name, i) => ({ name, val: set[stat][i] }));
        const lowGood = ['ERA', 'WHIP', 'K'].includes(stat);
        combined.sort((a, b) => lowGood ? a.val - b.val : b.val - a.val);

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: combined.map(d => d.name), datasets: [{ data: combined.map(d => d.val), backgroundColor: combined.map((d, i) => getGrad(i + 1, 14)), borderRadius: 8 }] },
            options: { 
                indexAxis: 'y', responsive: true, maintainAspectRatio: false, 
                plugins: { 
                    legend: { display: false }, 
                    datalabels: { anchor: 'end', align: 'right', color: '#1e293b', font: { weight: '800' }, formatter: (value) => formatValue(stat, value) } 
                } 
            }
        });
        renderTable();
    }

    function renderTable() {
        const currentData = calculatedData[currentWeek];
        const set = currentTableType === 'hitter' ? currentData.hitter : currentData.pitcher;
        const keys = Object.keys(set);
        let html = '<table><thead><tr><th>Team Name</th>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead><tbody>';
        
        teamList.forEach((name, idx) => {
            const info = teamsDB[name];
            html += `<tr><td style="text-align:left; font-weight:800; padding-left:15px;">${name} <span class="division-tag ${info.div === '현석' ? 'hs-tag' : 'jh-tag'}">${info.div}</span></td>`;
            keys.forEach(k => {
                const val = set[k][idx];
                const r = [...set[k]].sort((a, b) => (['ERA', 'WHIP', 'K'].includes(k)) ? a - b : b - a).indexOf(val) + 1;
                html += `<td><div class="rank-cell" style="background:${getGrad(r, 14)};"><span class="stat-val">${formatValue(k, val)}</span><span class="rank-info">${r}위</span></div></td>`;
            });
            html += '</tr>';
        });
        document.getElementById('tableContainer').innerHTML = html + '</tbody></table>';
    }

    window.onload = () => {
        const pow = calcManagerPower();
        document.getElementById('managerTop3').innerHTML = pow.slice(0, 3).map((m, i) => `
            <div class="manager-card"><span class="top-label">운영 실력 ${i+1}위</span><span class="team-name">${m.name}</span><div class="efficiency-score">${m.score > 0 ? '+' : ''}${m.score.toFixed(1)}</div></div>
        `).join('');
        
        const sortedStandings = [...leagueStandings].sort((a, b) => a.rank - b.rank);
        document.getElementById('standingsBody').innerHTML = sortedStandings.map(s => {
            const pInfo = pow.find(p => p.name === s.name);
            return `<tr>
                <td>${s.rank}</td>
                <td style="text-align:left; padding-left:15px;">${s.name} <span class="division-tag ${s.div === '현석' ? 'hs-tag' : 'jh-tag'}">${s.div}</span></td>
                <td>${s.div} 리그</td>
                <td>${s.wlt}</td>
                <td>${s.pct.toFixed(3)}</td>
                <td style="color:${pInfo.score > 0 ? '#ef4444' : '#3b82f6'}">${pInfo.score > 0 ? '+' : ''}${pInfo.score.toFixed(1)}</td>
            </tr>`;
        }).join('');
        renderDashboard();
    };
</script>
