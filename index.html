<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MLB Fantasy - Accurate Rankings V10</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <style>
        body { font-family: 'Pretendard', -apple-system, sans-serif; background-color: #f8fafc; margin: 0; padding: 20px; color: #1e293b; }
        .container { max-width: 1400px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h1 { text-align: center; color: #0f172a; margin-bottom: 30px; font-weight: 800; }
        
        /* 리그 순위표 스타일 */
        .standings-wrapper { margin-bottom: 50px; background: #fff; border: 2px solid #0f172a; border-radius: 12px; overflow: hidden; }
        .standings-header { background: #0f172a; color: white; padding: 15px; font-weight: 800; font-size: 18px; text-align: center; }
        .standings-table { width: 100%; border-collapse: collapse; }
        .standings-table th { background: #f1f5f9; color: #475569; padding: 12px; font-size: 14px; }
        .standings-table td { padding: 12px; text-align: center; border-bottom: 1px solid #f1f5f9; font-weight: 600; }
        .division-tag { font-size: 11px; padding: 2px 6px; border-radius: 4px; margin-left: 5px; font-weight: normal; }
        .hs-tag { background: #fee2e2; color: #ef4444; } /* 현석 리그 */
        .jh-tag { background: #e0f2fe; color: #0ea5e9; } /* 지훈 리그 */

        /* 주차/탭 버튼 */
        .week-selector { display: flex; justify-content: center; gap: 10px; margin-bottom: 25px; }
        .week-btn { padding: 12px 30px; border: 1px solid #e2e8f0; border-radius: 30px; background: white; cursor: pointer; transition: 0.3s; font-weight: 700; color: #64748b; }
        .week-btn.active { background: #ef4444; color: white; border-color: #ef4444; box-shadow: 0 4px 12px rgba(239, 68, 68, 0.3); }

        .tab-buttons { display: flex; justify-content: center; margin-bottom: 15px; }
        .tab-buttons button { padding: 14px 40px; cursor: pointer; border: 1px solid #e2e8f0; background: #f8fafc; font-weight: 700; transition: 0.2s; color: #475569; }
        .tab-buttons button.active { background: #f1f5f9; color: #0f172a; border-bottom: 3px solid #ef4444; }

        /* 데이터 테이블 */
        .table-wrapper { overflow-x: auto; margin-bottom: 50px; border: 1px solid #e2e8f0; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 1100px; font-size: 13px; }
        th, td { padding: 12px 6px; text-align: center; border: 1px solid #f1f5f9; }
        th { background-color: #f8fafc; color: #334155; font-weight: 700; }
        .rank-cell { border-radius: 6px; padding: 6px 2px; display: block; color: #000; }
        .stat-val { font-weight: 800; display: block; font-size: 14px; margin-bottom: 2px; }
        .rank-info { font-size: 12px; font-weight: 700; opacity: 0.8; }

        /* 차트 */
        .controls { display: flex; justify-content: center; align-items: center; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 12px; }
        select { padding: 10px 20px; font-size: 16px; border-radius: 8px; border: 1px solid #cbd5e1; font-weight: 600; cursor: pointer; }
        .chart-container { position: relative; height: 600px; width: 100%; padding: 15px; background: #fff; border: 1px solid #e2e8f0; border-radius: 12px; }
    </style>
</head>
<body>

<div class="container">
    <h1>⚾ MLB Fantasy Dashboard V10</h1>

    <!-- [수정완료] 이미지(image_98abd0.png) 기반 전체 순위표 -->
    <div class="standings-wrapper">
        <div class="standings-header">🏆 Overall Rankings (Week 5 Cumulative)</div>
        <table class="standings-table">
            <thead>
                <tr>
                    <th>Rank</th><th>Team Name</th><th>Division</th><th>W-L-T</th><th>Pct</th>
                </tr>
            </thead>
            <tbody id="standingsBody">
                <!-- 스크립트로 렌더링 -->
            </tbody>
        </table>
    </div>

    <div class="week-selector">
        <button class="week-btn active" onclick="updateView('Total')">1-5주 누적 기록</button>
        <button class="week-btn" onclick="updateView('Week5')">5주차 Weekly</button>
    </div>

    <div class="tab-buttons">
        <button id="btnHitter" class="active" onclick="toggleTable('hitter')">Hitter Statistics</button>
        <button id="btnPitcher" onclick="toggleTable('pitcher')">Pitcher Statistics</button>
    </div>
    <div id="tableContainer" class="table-wrapper"></div>

    <div class="controls">
        <label>📊 데이터 시각화: </label>
        <select id="statSelect" onchange="renderDashboard()">
            <optgroup label="Hitter Stats">
                <option value="R">R (득점)</option><option value="HR">HR (홈런)</option>
                <option value="RBI">RBI (타점)</option><option value="SB">SB (도루)</option>
                <option value="OBP">OBP (출루율)</option><option value="OPS">OPS (장타율 포함)</option>
            </optgroup>
            <optgroup label="Pitcher Stats">
                <option value="IP">IP (이닝)</option><option value="ERA">ERA (방어율) ↓</option>
                <option value="WHIP">WHIP (출루허용) ↓</option><option value="K_BB">K/BB (삼진/볼넷)</option>
                <option value="QS">QS (퀄리티 스타트)</option><option value="SV_H">SV+H (세이브+홀드)</option>
                <option value="NW">NW (넷승)</option>
            </optgroup>
        </select>
    </div>
    <div class="chart-container">
        <canvas id="statChart"></canvas>
    </div>
</div>

<script>
    Chart.register(ChartDataLabels);

    // [최종 데이터] image_98abd0.png에 따른 정확한 순위 및 정보
    const leagueStandings = [
        { rank: 1, name: "Real Twins", div: "현석", wlt: "41-25-4", pct: "0.614" },
        { rank: 2, name: "Murry-Ker Daehyun", div: "지훈", wlt: "38-28-4", pct: "0.571" },
        { rank: 3, name: "Sleeping Jihoo", div: "현석", wlt: "42-27-1", pct: "0.607" },
        { rank: 4, name: "10 LuckyVickies", div: "현석", wlt: "39-27-4", pct: "0.586" },
        { rank: 5, name: "Multi Champion", div: "현석", wlt: "36-27-7", pct: "0.564" },
        { rank: 6, name: "Sakers_sAviOr", div: "지훈", wlt: "37-28-5", pct: "0.564" },
        { rank: 7, name: "Cho Biden", div: "현석", wlt: "34-34-2", pct: "0.500" },
        { rank: 8, name: "Chief Residents", div: "지훈", wlt: "31-34-5", pct: "0.479" },
        { rank: 9, name: "Kook Surfer", div: "현석", wlt: "30-35-5", pct: "0.464" },
        { rank: 10, name: "HanManDoo Jr.", div: "현석", wlt: "28-39-3", pct: "0.421" },
        { rank: 11, name: "daily sia", div: "지훈", wlt: "27-39-4", pct: "0.414" },
        { rank: 12, name: "Make MooMool Great Again", div: "지훈", wlt: "25-37-8", pct: "0.414" },
        { rank: 13, name: "Yubu airdoshi", div: "지훈", wlt: "25-38-7", pct: "0.407" },
        { rank: 14, name: "Not Seoul Mayor", div: "지훈", wlt: "26-41-3", pct: "0.393" }
    ];

    // 스탯 데이터 정의 (기존 이미지 image_9849b7.png, image_984982.png 기반)
    const weeklyData = {
        "Total": {
            teams: leagueStandings.map(s => s.name),
            hitter: {
                R: [121, 119, 131, 150, 139, 143, 110, 111, 140, 121, 109, 158, 119, 150],
                HR: [37, 30, 39, 45, 45, 37, 32, 34, 28, 26, 23, 39, 28, 40],
                RBI: [145, 122, 123, 115, 127, 129, 124, 121, 104, 100, 103, 139, 113, 131],
                SB: [17, 33, 19, 11, 24, 23, 22, 17, 32, 14, 22, 27, 13, 9],
                OBP: [0.335, 0.333, 0.342, 0.363, 0.344, 0.339, 0.327, 0.334, 0.333, 0.336, 0.313, 0.338, 0.324, 0.339],
                OPS: [0.782, 0.744, 0.766, 0.832, 0.804, 0.766, 0.716, 0.757, 0.722, 0.734, 0.688, 0.775, 0.694, 0.775]
            },
            pitcher: {
                IP: [211, 260.2, 261, 283.2, 267.2, 233, 285, 261.1, 214.2, 273.2, 253, 236, 196, 199],
                ERA: [3.84, 3.66, 4.10, 3.36, 4.34, 4.17, 3.98, 4.44, 3.98, 3.78, 3.77, 3.85, 4.04, 4.52],
                WHIP: [1.10, 1.15, 1.33, 1.17, 1.32, 1.23, 1.25, 1.42, 1.22, 1.27, 1.21, 1.08, 1.33, 1.44],
                K_BB: [3.24, 3.15, 2.19, 2.78, 2.46, 2.37, 3.15, 2.35, 3.01, 2.79, 3.02, 3.10, 2.41, 2.16],
                QS: [15, 19, 16, 22, 16, 14, 18, 13, 13, 12, 17, 14, 13, 12],
                SV_H: [13, 2, 18, 10, 14, 14, 24, 13, 15, 9, 14, 21, 16, 16],
                NW: [-2, 6, 4, 8, -6, 5, 1, -4, 0, 4, 0, 0, 1, -7]
            }
        },
        "Week5": { /* (이전 Weekly 로직 유지) */ }
    };

    let currentWeek = 'Total';
    let currentTableType = 'hitter';
    let myChart;

    function renderStandings() {
        document.getElementById('standingsBody').innerHTML = leagueStandings.map(s => `
            <tr>
                <td>${s.rank}</td>
                <td style="text-align:left;">${s.name}</td>
                <td><span class="division-tag ${s.div === '현석' ? 'hs-tag' : 'jh-tag'}">${s.div} 리그</span></td>
                <td>${s.wlt}</td>
                <td>${s.pct}</td>
            </tr>
        `).join('');
    }

    function updateView(week) {
        currentWeek = week;
        document.querySelectorAll('.week-btn').forEach(btn => btn.classList.toggle('active', btn.innerText.includes(week === 'Total' ? '누적' : '5주차')));
        renderDashboard();
    }

    function toggleTable(type) {
        currentTableType = type;
        document.getElementById('btnHitter').classList.toggle('active', type === 'hitter');
        document.getElementById('btnPitcher').classList.toggle('active', type === 'pitcher');
        renderTable();
    }

    function getGradientColor(rank, total) {
        const ratio = (rank - 1) / (total - 1); 
        return `rgb(${Math.round(239 + (254 - 239) * ratio)}, ${Math.round(68 + (240 - 68) * ratio)}, ${Math.round(68 + (138 - 68) * ratio)})`;
    }

    function renderDashboard() {
        const selectedStat = document.getElementById('statSelect').value;
        const weekData = weeklyData[currentWeek] || weeklyData['Total'];
        const ctx = document.getElementById('statChart').getContext('2d');
        const dataSet = { ...weekData.hitter, ...weekData.pitcher };
        const combined = weekData.teams.map((team, i) => ({ name: team, val: dataSet[selectedStat][i] }));
        const isLowerBetter = (selectedStat === 'ERA' || selectedStat === 'WHIP');
        combined.sort((a, b) => isLowerBetter ? a.val - b.val : b.val - a.val);

        if (myChart) myChart.destroy();
        myChart = new Chart(ctx, {
            type: 'bar',
            data: { labels: combined.map(d => d.name), datasets: [{ data: combined.map(d => d.val), backgroundColor: combined.map((d, i) => getGradientColor(i + 1, combined.length)), borderRadius: 8 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, datalabels: { anchor: 'end', align: 'right', color: '#1e293b', font: { weight: '800' } } } }
        });
        renderTable();
    }

    function renderTable() {
        const weekData = weeklyData[currentWeek] || weeklyData['Total'];
        const dataSet = currentTableType === 'hitter' ? weekData.hitter : weekData.pitcher;
        const keys = Object.keys(dataSet);
        let html = '<table><thead><tr><th style="width:200px;">Team Name</th>' + keys.map(k => `<th>${k}</th>`).join('') + '</tr></thead><tbody>';
        weekData.teams.forEach((team, idx) => {
            const teamInfo = leagueStandings.find(s => s.name === team);
            html += `<tr><td style="text-align:left; font-weight:800; background:#fcfcfc; padding-left:15px;">${team} <span class="division-tag ${teamInfo.div === '현석' ? 'hs-tag' : 'jh-tag'}">${teamInfo.div}</span></td>`;
            keys.forEach(k => {
                const val = dataSet[k][idx];
                const rank = [...dataSet[k]].sort((a, b) => (k === 'ERA' || k === 'WHIP') ? a - b : b - a).indexOf(val) + 1;
                html += `<td><div class="rank-cell" style="background:${getGradientColor(rank, 14)};"><span class="stat-val">${val}</span><span class="rank-info">${rank}위</span></div></td>`;
            });
            html += '</tr>';
        });
        document.getElementById('tableContainer').innerHTML = html + '</tbody></table>';
    }

    window.onload = () => { renderStandings(); renderDashboard(); };
</script>

</body>
</html>
